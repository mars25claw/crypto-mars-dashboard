<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Mars — Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    color: #eee;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo { font-size: 48px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #555; margin-bottom: 36px; letter-spacing: 0.05em; text-transform: uppercase; }
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 24px;
    background: #fff;
    color: #333;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s, box-shadow 0.15s;
  }
  .google-btn:hover {
    background: #f5f5f5;
    box-shadow: 0 2px 12px rgba(255,255,255,0.1);
  }
  .google-btn:active { background: #eee; }
  .restricted {
    margin-top: 20px;
    font-size: 12px;
    color: #444;
  }
  .restricted span { color: #4ade80; }
</style>
</head>
<body>
<div class="card">
  <div class="logo"><img src="/logo.png" style="width:80px;height:80px;border-radius:50%;object-fit:cover" alt="Crypto Mars"></div>
  <h1>Crypto Mars</h1>
  <p class="sub">Secure Trading Dashboard</p>

  <a class="google-btn" href="/api/auth/google">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </a>

  <p class="restricted">Access restricted to <span>rsmars20@gmail.com</span></p>
</div>
</body>
</html>
